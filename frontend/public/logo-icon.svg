<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00C2FF"/>
      <stop offset="55%"  stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="72" height="72" rx="18"/></clipPath>
  </defs>

  <!-- Dark background + subtle grid -->
  <g clip-path="url(#clip)">
    <rect width="72" height="72" fill="#0f1020"/>
    <rect width="72" height="72" fill="url(#g)" opacity=".1"/>
    <line x1="12" y1="0"  x2="12" y2="72" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="24" y1="0"  x2="24" y2="72" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="36" y1="0"  x2="36" y2="72" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="48" y1="0"  x2="48" y2="72" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="60" y1="0"  x2="60" y2="72" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="0"  y1="24" x2="72" y2="24" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="0"  y1="36" x2="72" y2="36" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="0"  y1="48" x2="72" y2="48" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
    <line x1="0"  y1="60" x2="72" y2="60" stroke="rgba(108,99,255,.12)" stroke-width=".6"/>
  </g>

  <!-- UB Monogram with glow -->
  <g filter="url(#glow)">
    <!-- U: left stroke -->
    <rect x="13" y="16" width="5" height="32" rx="2.5" fill="url(#g)"/>
    <!-- U: right stroke -->
    <rect x="31" y="16" width="5" height="32" rx="2.5" fill="url(#g)"/>
    <!-- U: bottom curve -->
    <path d="M13 42 Q13 52 24 52 Q35 52 36 42"
      stroke="url(#g)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- B: vertical stem -->
    <rect x="38" y="16" width="5" height="40" rx="2.5" fill="url(#g)"/>
    <!-- B: top bump -->
    <path d="M43 16 L52 16 Q60 16 60 24 Q60 32 52 32 L43 32"
      stroke="url(#g)" stroke-width="5" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- B: bottom bump -->
    <path d="M43 32 L53 32 Q62 32 62 41 Q62 50 53 50 L43 50"
      stroke="url(#g)" stroke-width="5" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="43" y1="50" x2="43" y2="56"
      stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Circuit node dots -->
  <circle cx="13" cy="36" r="2.5" fill="#00C2FF"/>
  <circle cx="36" cy="36" r="2.5" fill="#6C63FF"/>
  <circle cx="60" cy="24" r="2"   fill="#00C2FF"/>
  <circle cx="62" cy="41" r="2"   fill="#a855f7"/>

  <!-- Circuit traces -->
  <line x1="0"  y1="36" x2="11" y2="36"
    stroke="#00C2FF" stroke-width="1" opacity=".45" stroke-dasharray="2 2"/>
  <line x1="61" y1="24" x2="72" y2="24"
    stroke="#00C2FF" stroke-width="1" opacity=".45" stroke-dasharray="2 2"/>
  <line x1="63" y1="41" x2="72" y2="41"
    stroke="#a855f7" stroke-width="1" opacity=".45" stroke-dasharray="2 2"/>

  <!-- Border glow ring -->
  <rect x=".75" y=".75" width="70.5" height="70.5" rx="17.25"
    fill="none" stroke="url(#g)" stroke-width="1.5" opacity=".55"/>
</svg>